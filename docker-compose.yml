services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: raglms-sqlserver
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: ${DB_SA_PASSWORD}
      MSSQL_PID: Express
    ports:
      - "14333:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P ${DB_SA_PASSWORD} -Q 'SELECT 1' -No -C || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

volumes:
  sqlserver_data:
